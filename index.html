<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Clientes</title>
</head>
<body>
    <h1>Clientes Registrados</h1>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th><th>Nombre</th><th>Apellidos</th><th>Ciudad</th>
            </tr>
        </thead>
        <tbody id="lista-clientes"></tbody>
    </table>

    <script>
        // La URL debe ser exactamente la que pidió la Ing. Mariana
        fetch('http://backend-service:3000/clientes')
            .then(res => res.json())
            .then(data => {
                const tabla = document.getElementById('lista-clientes');
                data.forEach(c => {
                    tabla.innerHTML += `<tr><td>${c.id}</td><td>${c.nombre}</td><td>${c.apellidos}</td><td>${c.ciudad}</td></tr>`;
                });
            })
            .catch(err => console.error("Error:", err));
    </script>
</body>
</html>
